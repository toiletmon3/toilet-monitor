; ToiletMon sensor bridge — HLK-LD2450 radar over WiFi
;
; Two supported boards, one firmware. ESP Web Tools on the /flash page
; auto-selects the matching binary from the connected chip family.
;
;   env:tsim7670g-s3  — LILYGO T-SIM7670G-S3 (ESP32-S3)
;     LD2450 5V  -> VIN_5V
;     LD2450 GND -> GND
;     LD2450 TX  -> GPIO15
;     LD2450 RX  -> GPIO16
;   (the SIM7670G modem is intentionally unused — WiFi-only deployment)
;
;   env:esp32dev      — NodeMCU-ESP32 / ESP32 DevKitV1 (ESP32 classic, 30-pin)
;     LD2450 5V  -> VIN (or 3V3)
;     LD2450 GND -> GND
;     LD2450 TX  -> GPIO16 (RX2)
;     LD2450 RX  -> GPIO17 (TX2)
;
; Radar pins are selected per chip in src/main.cpp (CONFIG_IDF_TARGET_*).
;
; Platform comes from pioarduino (community espressif32 fork) because its
; packages are hosted on GitHub Releases — the PlatformIO registry is not
; reachable from the CI/build environment.

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
monitor_speed = 115200

[env:tsim7670g-s3]
board = esp32-s3-devkitc-1
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Classic ESP32 (NodeMCU-ESP32 / DevKitV1). No native USB — the CP2102 UART
; bridge handles flashing + serial, so the USB-CDC flags above must NOT be set.
[env:esp32dev]
board = esp32dev
