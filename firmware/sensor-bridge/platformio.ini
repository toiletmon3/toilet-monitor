; ToiletMon sensor bridge — LILYGO T-SIM7670G-S3 + HLK-LD2450 radar
;
; Wiring (agreed with hardware):
;   LD2450 5V  -> VIN_5V
;   LD2450 GND -> GND
;   LD2450 TX  -> GPIO15
;   LD2450 RX  -> GPIO16
;
; The SIM7670G modem is intentionally unused (WiFi-only deployment).
;
; Platform comes from pioarduino (community espressif32 fork) because its
; packages are hosted on GitHub Releases — the PlatformIO registry is not
; reachable from the CI/build environment.

[env:tsim7670g-s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
