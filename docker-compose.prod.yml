version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: toilet_postgres
    restart: always
    environment:
      POSTGRES_DB: toilet_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: toilet_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - internal

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: toilet_server
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/toilet_monitor
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - web

  nginx:
    image: nginx:alpine
    container_name: toilet_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - web_static:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - server
    networks:
      - web

  # Automated daily backup
  backup:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
        pg_dump -h postgres -U postgres toilet_monitor > /backups/backup_$$TIMESTAMP.sql;
        find /backups -name '*.sql' -mtime +30 -delete;
        echo \"Backup completed: $$TIMESTAMP\";
        sleep 86400;
      done"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
  web:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  web_static:
  certbot_www:
