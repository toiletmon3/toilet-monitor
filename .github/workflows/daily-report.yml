name: Daily Report Email

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Login and fetch report
        id: fetch
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          BASE="https://toiletcleanpro.duckdns.org/api"
          
          echo "Logging in..."
          LOGIN=$(curl -s --max-time 15 -X POST "$BASE/auth/admin/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}")
          
          TOKEN=$(echo "$LOGIN" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "Login failed:"
            echo "$LOGIN"
            exit 1
          fi
          echo "Login OK"
          
          echo "Fetching analytics..."
          SUMMARY=$(curl -s --max-time 15 -H "Authorization: Bearer $TOKEN" "$BASE/analytics/summary")
          FREQ=$(curl -s --max-time 15 -H "Authorization: Bearer $TOKEN" "$BASE/analytics/issue-frequency?days=1")
          SLA=$(curl -s --max-time 15 -H "Authorization: Bearer $TOKEN" "$BASE/analytics/sla?days=1")
          CLEANERS=$(curl -s --max-time 15 -H "Authorization: Bearer $TOKEN" "$BASE/analytics/cleaners?days=1")
          
          echo "$SUMMARY" > /tmp/summary.json
          echo "$FREQ" > /tmp/freq.json
          echo "$SLA" > /tmp/sla.json
          echo "$CLEANERS" > /tmp/cleaners.json
          echo "Data fetched"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build and send email
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
        run: |
          npm install nodemailer
          
          node << 'EOF'
          const nodemailer = require('nodemailer');
          const fs = require('fs');
          
          const summary = JSON.parse(fs.readFileSync('/tmp/summary.json', 'utf8'));
          const freq = JSON.parse(fs.readFileSync('/tmp/freq.json', 'utf8'));
          const sla = JSON.parse(fs.readFileSync('/tmp/sla.json', 'utf8'));
          const cleaners = JSON.parse(fs.readFileSync('/tmp/cleaners.json', 'utf8'));
          
          const recipients = process.env.REPORT_RECIPIENTS || 'ori.aha1@gmail.com';
          
          const today = new Date().toLocaleDateString('he-IL', { weekday:'long', day:'numeric', month:'long', year:'numeric', timeZone:'Asia/Jerusalem' });
          
          const slaColor = sla.slaPercent >= 80 ? '#22c55e' : sla.slaPercent >= 50 ? '#eab308' : '#ef4444';
          
          const issueRows = freq.slice(0, 5).map((f, i) => {
            const name = f.nameI18n?.he || f.nameI18n?.en || '—';
            return `<tr style="border-bottom:1px solid #1e293b;">
              <td style="padding:10px 8px;color:#94a3b8;font-size:12px;">${i+1}</td>
              <td style="padding:10px 8px;color:#e2e8f0;font-size:13px;">${name}</td>
              <td style="padding:10px 8px;color:#00e5cc;font-weight:bold;font-size:14px;text-align:left;">${f.count}</td>
            </tr>`;
          }).join('');
          
          const cleanerRows = cleaners.slice(0, 5).map((c, i) => {
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}`;
            return `<tr style="border-bottom:1px solid #1e293b;">
              <td style="padding:10px 8px;font-size:14px;text-align:center;">${medal}</td>
              <td style="padding:10px 8px;color:#e2e8f0;font-size:13px;">${c.name}</td>
              <td style="padding:10px 8px;color:#22c55e;font-weight:bold;font-size:14px;text-align:center;">${c.totalResolved}</td>
              <td style="padding:10px 8px;color:#94a3b8;font-size:12px;text-align:center;">${Math.round(c.avgResolutionMinutes)} דק'</td>
            </tr>`;
          }).join('');
          
          function statCard(label, value, color) {
            return `<td style="padding:8px;"><div style="background:${color}15;border:1px solid ${color}40;border-radius:12px;padding:16px;text-align:center;">
              <div style="font-size:28px;font-weight:bold;color:${color};">${value}</div>
              <div style="font-size:12px;color:#94a3b8;margin-top:4px;">${label}</div>
            </div></td>`;
          }
          
          const html = `<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="utf-8"></head>
          <body style="margin:0;padding:0;background:#0b1120;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
          <div style="max-width:600px;margin:0 auto;padding:24px 16px;">
            <div style="text-align:center;padding:24px 0 16px;">
              <div style="font-size:32px;">🚾</div>
              <h1 style="color:#00e5cc;font-size:20px;margin:8px 0 4px;">סיכום יומי — ToiletMon</h1>
              <div style="color:#64748b;font-size:13px;">${today}</div>
            </div>
            <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
              <tr>
                ${statCard('תקלות פתוחות', summary.openIncidents, '#ef4444')}
                ${statCard('טופלו (סה"כ)', summary.resolvedIncidents, '#22c55e')}
              </tr>
              <tr>
                ${statCard('זמן טיפול ממוצע', summary.avgResolutionMinutes + " דק'", '#8b5cf6')}
                ${statCard('עמידה ב-SLA', (sla.slaPercent || 0) + '%', slaColor)}
              </tr>
              <tr>
                ${statCard('עובדים פעילים', summary.activeCleaners, '#00e5cc')}
                ${statCard('טאבלטים מחוברים', summary.onlineDevices, '#3b82f6')}
              </tr>
            </table>
            ${freq.length > 0 ? `
            <div style="padding:20px 0 8px;font-size:14px;font-weight:bold;color:#00e5cc;border-bottom:1px solid #00e5cc30;padding-bottom:6px;">🔝 בעיות נפוצות (אתמול)</div>
            <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;background:#0f172a;border-radius:10px;overflow:hidden;margin-top:8px;">
              ${issueRows}
            </table>` : ''}
            ${cleaners.length > 0 ? `
            <div style="padding:20px 0 8px;font-size:14px;font-weight:bold;color:#00e5cc;border-bottom:1px solid #00e5cc30;padding-bottom:6px;">👷 ביצועי עובדים</div>
            <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;background:#0f172a;border-radius:10px;overflow:hidden;margin-top:8px;">
              <tr style="border-bottom:1px solid #1e293b;">
                <th style="padding:10px 8px;color:#64748b;font-size:11px;text-align:center;">#</th>
                <th style="padding:10px 8px;color:#64748b;font-size:11px;text-align:right;">שם</th>
                <th style="padding:10px 8px;color:#64748b;font-size:11px;text-align:center;">טיפולים</th>
                <th style="padding:10px 8px;color:#64748b;font-size:11px;text-align:center;">זמן ממוצע</th>
              </tr>
              ${cleanerRows}
            </table>` : ''}
            <div style="text-align:center;padding:32px 0 16px;color:#475569;font-size:11px;">
              דוח זה נשלח אוטומטית מ-ToiletMon · <span style="color:#00e5cc;">toiletcleanpro.duckdns.org</span>
            </div>
          </div></body></html>`;
          
          const transporter = nodemailer.createTransport({
            service: 'gmail',
            auth: {
              user: process.env.SMTP_USER,
              pass: process.env.SMTP_PASS.replace(/\s/g, ''),
            },
          });
          
          async function main() {
            await transporter.sendMail({
              from: `ToiletMon <${process.env.SMTP_USER}>`,
              to: recipients,
              subject: `📊 סיכום יומי — ToiletMon — ${today}`,
              html,
            });
            console.log('Email sent to:', recipients);
          }
          
          main().then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1); });
          EOF
