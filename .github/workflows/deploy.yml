name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.cursor/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight — verify SSH host reachable
        run: |
          RAW_HOST="${{ secrets.SSH_HOST }}"
          HOST=$(echo -n "$RAW_HOST" | tr -d '\r\n' | xargs)
          if [ -z "$HOST" ]; then
            echo "::error::SSH_HOST secret is empty"
            exit 1
          fi
          echo "SSH_HOST='$HOST' (len=${#HOST})"
          echo "Testing TCP port 22..."
          if timeout 10 bash -c "exec 3<>/dev/tcp/$HOST/22"; then
            echo "SSH port 22 open on $HOST"
          else
            echo "::error::SSH port 22 unreachable on $HOST — server down, firewall blocking, or wrong SSH_HOST secret value"
            exit 1
          fi

      # ── Build accelerator (best-effort) ─────────────────────────────────────
      # Compile the app on the fast GitHub runner and ship ONLY the artefacts
      # (apps/web/dist + apps/server/dist) to the VPS, so the droplet skips its
      # slow build. EVERY step here is continue-on-error and only sets
      # PREBUILT_SHA once the build+integrity+rsync all succeed — if anything
      # fails, PREBUILT_SHA stays empty and deploy.sh builds on the VPS exactly
      # like before. The web/server bundles carry no build-time env (API base is
      # the relative /api, VAPID key is a source constant), so a runner build is
      # byte-for-byte what the VPS would have produced.
      - name: Checkout (for CI build)
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        continue-on-error: true
        with:
          version: 9

      - name: Setup Node + pnpm cache
        uses: actions/setup-node@v4
        continue-on-error: true
        with:
          node-version: 22
          cache: pnpm

      - name: Build on runner and ship artefacts to VPS
        continue-on-error: true
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SHA: ${{ github.sha }}
        run: |
          set -eo pipefail
          pnpm install --frozen-lockfile
          # Prisma client must exist before `nest build` typechecks the server.
          ( cd apps/server && pnpm exec prisma generate )
          # Build server + web directly — exactly what the VPS does. NOT the root
          # `pnpm run build`: that also compiles @toilet/shared-types via a bare
          # `tsc`, but shared-types has no tsconfig and fails; server/web consume
          # it straight from source, so no separate shared-types build is needed.
          pnpm --filter @toilet/server build
          pnpm --filter @toilet/web build
          # Integrity gate: never ship a broken/empty build — fall through to a
          # VPS build instead. Entry point path matches ecosystem.config.cjs.
          test -s apps/web/dist/index.html
          test -s apps/server/dist/src/main.js
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          HOST=$(printf '%s' "$SSH_HOST" | tr -d '\r\n' | xargs)
          USER=$(printf '%s' "$SSH_USER" | tr -d '\r\n' | xargs)
          RSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=20"
          # --delete mirrors the source so stale files from an older build can't
          # linger. dist/ is gitignored, so the VPS `git pull` won't disturb it.
          rsync -az --delete -e "$RSH" apps/web/dist/    "$USER@$HOST:/opt/toilet-monitor/apps/web/dist/"
          rsync -az --delete -e "$RSH" apps/server/dist/ "$USER@$HOST:/opt/toilet-monitor/apps/server/dist/"
          echo "PREBUILT_SHA=$SHA" >> "$GITHUB_ENV"
          echo "Shipped prebuilt artefacts for $SHA"

      - name: Deploy via SSH (raw ssh, no appleboy)
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
        run: |
          set +e  # don't let the auth diagnostic abort the job
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          HOST=$(printf '%s' "${{ secrets.SSH_HOST }}" | tr -d '\r\n' | xargs)
          USER=$(printf '%s' "${{ secrets.SSH_USER }}" | tr -d '\r\n' | xargs)

          # === Basic sanity only — never surface key material/fingerprint ===
          # (KEY_BYTES is kept solely for the length sanity-check below.)
          KEY_BYTES=$(stat -c%s ~/.ssh/deploy_key 2>/dev/null || echo 0)
          echo "=== Diagnostics ==="
          echo "HOST len=${#HOST}  USER len=${#USER}  KEY bytes=$KEY_BYTES"

          if [ -z "$USER" ]; then
            echo "::error::SSH_USER secret is empty — set it in repo Settings → Secrets → Actions"
            exit 1
          fi
          if [ "$KEY_BYTES" -lt 100 ]; then
            echo "::error::SSH_PRIVATE_KEY is too short ($KEY_BYTES bytes) — secret missing or corrupted"
            exit 1
          fi

          echo "=== SSH auth test to $USER@$HOST ==="
          ssh -v -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -o BatchMode=yes \
            "$USER@$HOST" 'echo SSH_AUTH_OK' > /tmp/ssh-auth.log 2>&1
          AUTH_EXIT=$?
          echo "SSH auth exit code: $AUTH_EXIT"
          echo "--- ssh -v output (last 60 lines) ---"
          tail -60 /tmp/ssh-auth.log
          echo "--- end ssh -v output ---"

          {
            echo ""
            echo "### SSH auth test"
            echo "Exit code: \`$AUTH_EXIT\`"
            echo ""
            echo '```'
            tail -60 /tmp/ssh-auth.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ $AUTH_EXIT -ne 0 ]; then
            echo "::error::SSH authentication failed (exit $AUTH_EXIT). See step summary for full ssh -v output."
            exit $AUTH_EXIT
          fi

          set -e
          echo "=== Running deploy ==="
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=15 \
            "$USER@$HOST" /bin/bash << ENDSSH
          set -e
          export VAPID_PUBLIC_KEY="${VAPID_PUBLIC_KEY}"
          export VAPID_PRIVATE_KEY="${VAPID_PRIVATE_KEY}"
          export GMAIL_USER="${GMAIL_USER}"
          export GMAIL_CLIENT_ID="${GMAIL_CLIENT_ID}"
          export GMAIL_CLIENT_SECRET="${GMAIL_CLIENT_SECRET}"
          export GMAIL_REFRESH_TOKEN="${GMAIL_REFRESH_TOKEN}"
          export CRON_SECRET="${CRON_SECRET}"
          export GITHUB_PAT="${GITHUB_PAT}"
          # Empty unless the build-accelerator step above succeeded end-to-end.
          export PREBUILT_SHA="${PREBUILT_SHA}"
          echo "=== [$(date -u +%H:%M:%S)] start ==="
          cd /opt/toilet-monitor
          rm -f .git/index.lock .git/HEAD.lock .git/FETCH_HEAD.lock 2>/dev/null || true
          GIT_TERMINAL_PROMPT=0 timeout 60 git pull --no-edit
          echo "=== [$(date -u +%H:%M:%S)] deploy ==="
          bash scripts/deploy.sh
          echo "=== [$(date -u +%H:%M:%S)] done ==="
          ENDSSH

      - name: Smoke test — verify site is not showing default nginx page
        run: |
          # Poll instead of a fixed sleep: pass as soon as the site serves the
          # app (usually a few seconds), only wait longer if it's slow to come up.
          HTTP_CODE="000"
          for i in $(seq 1 15); do
            HTTP_CODE=$(curl -s -o /tmp/smoke-body.txt -w "%{http_code}" \
              --max-time 15 -L -k "https://cleanco.ai" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "000" ] && ! grep -qi "welcome to nginx" /tmp/smoke-body.txt 2>/dev/null; then
              echo "Smoke test passed — site is serving the app (HTTP $HTTP_CODE, after ~$((i*2))s)"
              exit 0
            fi
            sleep 2
          done

          echo "Final HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "::warning::Could not reach production site — network issue or server down"
            exit 0
          fi
          if grep -qi "welcome to nginx" /tmp/smoke-body.txt 2>/dev/null; then
            echo "::error::Production site is showing the default nginx page!"
            cat /tmp/smoke-body.txt
            exit 1
          fi
          echo "Smoke test passed — site is serving the app (HTTP $HTTP_CODE)"

  notify-on-failure:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure email via Gmail API
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          DEPLOY_NOTIFY_TO: ${{ secrets.DEPLOY_NOTIFY_TO }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PUSHER: ${{ github.event.head_commit.author.name }}
        run: |
          set -e
          if [ -z "$GMAIL_CLIENT_ID" ] || [ -z "$GMAIL_REFRESH_TOKEN" ]; then
            echo "Gmail API secrets missing — cannot send notification"
            exit 0
          fi

          TO="${DEPLOY_NOTIFY_TO:-$GMAIL_USER}"
          FROM="${GMAIL_USER:-toiletmon3@gmail.com}"

          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=$GMAIL_CLIENT_ID" \
            -d "client_secret=$GMAIL_CLIENT_SECRET" \
            -d "refresh_token=$GMAIL_REFRESH_TOKEN" \
            -d "grant_type=refresh_token" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to get OAuth access token"
            exit 1
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -1 | sed 's/[<>&"]/ /g')

          HTML_BODY="<h2 style=\"color:#ef4444\">❌ Deploy to Production failed</h2>
          <p><b>Commit:</b> <a href=\"$COMMIT_URL\">$SHORT_SHA</a> — $SAFE_MSG</p>
          <p><b>Pushed by:</b> $PUSHER</p>
          <p><a href=\"$RUN_URL\" style=\"display:inline-block;padding:10px 20px;background:#3b82f6;color:white;text-decoration:none;border-radius:6px\">View Logs</a></p>
          <p style=\"color:#94a3b8;font-size:12px\">ToiletMon CI · $(date -u '+%Y-%m-%d %H:%M UTC')</p>"

          SUBJECT_B64=$(echo -n "❌ Deploy failed — $SHORT_SHA" | base64 -w0)
          BODY_B64=$(echo -n "$HTML_BODY" | base64 -w0)

          RAW=$(printf 'From: ToiletMon CI <%s>\r\nTo: %s\r\nSubject: =?UTF-8?B?%s?=\r\nMIME-Version: 1.0\r\nContent-Type: text/html; charset=UTF-8\r\nContent-Transfer-Encoding: base64\r\n\r\n%s' "$FROM" "$TO" "$SUBJECT_B64" "$BODY_B64" | base64 -w0 | tr '+/' '-_' | tr -d '=')

          RES=$(curl -s -w "\n%{http_code}" -X POST \
            "https://gmail.googleapis.com/gmail/v1/users/me/messages/send" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"raw\":\"$RAW\"}")

          HTTP_CODE=$(echo "$RES" | tail -1)
          BODY=$(echo "$RES" | sed '$d')

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Failure notification sent to $TO"
          else
            echo "Gmail API returned $HTTP_CODE: $BODY"
            exit 1
          fi
