name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: VAPID_PUBLIC_KEY,VAPID_PRIVATE_KEY,SMTP_USER,SMTP_PASS,CRON_SECRET,GITHUB_PAT
          script: |
            cd /opt/toilet-monitor
            git pull
            bash scripts/deploy.sh

      - name: Smoke test — verify site is not showing default nginx page
        run: |
          echo "Waiting 10s for deploy to stabilize..."
          sleep 10

          HTTP_CODE=$(curl -s -o /tmp/smoke-body.txt -w "%{http_code}" \
            --max-time 15 -L -k \
            "https://toiletcleanpro.duckdns.org" 2>/dev/null || echo "000")

          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "000" ]; then
            echo "::warning::Could not reach production site — network issue or server down"
            exit 0
          fi

          if grep -qi "welcome to nginx" /tmp/smoke-body.txt 2>/dev/null; then
            echo "::error::Production site is showing the default nginx page!"
            cat /tmp/smoke-body.txt
            exit 1
          fi

          echo "Smoke test passed — site is serving the app (HTTP $HTTP_CODE)"
