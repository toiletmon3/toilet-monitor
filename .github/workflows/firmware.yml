# Builds the ESP32 sensor-bridge firmware and commits the flashable binary
# into apps/web/public/firmware/ so the /flash page can serve it.
#
# The commit is pushed with GH_PAT (not GITHUB_TOKEN) on purpose: pushes made
# with the default token don't trigger other workflows, and we WANT the
# binary commit to trigger deploy.yml so the site picks it up.
#
# No trigger loop: this workflow only fires on firmware/** changes, while its
# own commit only touches apps/web/public/firmware/**.

name: Build Sensor Firmware

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware.yml'
  workflow_dispatch: {}

concurrency:
  group: firmware-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO + esptool
        run: pip install platformio "esptool==4.8.1"

      - name: Build firmware
        run: cd firmware/sensor-bridge && pio run

      - name: Merge into a single flashable image
        run: |
          BUILD=firmware/sensor-bridge/.pio/build/tsim7670g-s3
          BOOT_APP0=$(find ~/.platformio/packages -name boot_app0.bin | head -1)
          echo "boot_app0: $BOOT_APP0"
          mkdir -p apps/web/public/firmware
          esptool.py --chip esp32s3 merge_bin \
            -o apps/web/public/firmware/toiletmon-sensor.bin \
            0x0    "$BUILD/bootloader.bin" \
            0x8000 "$BUILD/partitions.bin" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$BUILD/firmware.bin"
          ls -la apps/web/public/firmware/

      - name: Commit binary to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/firmware/toiletmon-sensor.bin
          if git diff --cached --quiet; then
            echo "Binary unchanged, nothing to commit"
            exit 0
          fi
          git commit -m "ci: build sensor firmware binary"
          git pull --rebase origin main
          git push origin main
