# Builds the ESP32 sensor-bridge firmware and commits the flashable binary
# into apps/web/public/firmware/ so the /flash page can serve it.
#
# Pushes made with GITHUB_TOKEN don't trigger other workflows, so after
# committing the binary we dispatch deploy.yml explicitly via the API
# (explicit workflow_dispatch calls ARE allowed with GITHUB_TOKEN).
#
# No trigger loop: this workflow only fires on firmware/** changes, while its
# own commit only touches apps/web/public/firmware/**.

name: Build Sensor Firmware

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware.yml'
  workflow_dispatch: {}

concurrency:
  group: firmware-build
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO + esptool
        run: pip install platformio "esptool==4.8.1"

      - name: Build firmware (all boards)
        run: cd firmware/sensor-bridge && pio run

      - name: Merge into flashable images
        run: |
          BOOT_APP0=$(find ~/.platformio/packages -name boot_app0.bin | head -1)
          echo "boot_app0: $BOOT_APP0"
          mkdir -p apps/web/public/firmware

          # LILYGO T-SIM7670G-S3 (ESP32-S3) — bootloader at 0x0
          S3=firmware/sensor-bridge/.pio/build/tsim7670g-s3
          esptool.py --chip esp32s3 merge_bin \
            -o apps/web/public/firmware/toiletmon-sensor.bin \
            0x0    "$S3/bootloader.bin" \
            0x8000 "$S3/partitions.bin" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$S3/firmware.bin"

          # NodeMCU-ESP32 / DevKitV1 (ESP32 classic) — bootloader at 0x1000
          CLASSIC=firmware/sensor-bridge/.pio/build/esp32dev
          esptool.py --chip esp32 merge_bin \
            -o apps/web/public/firmware/toiletmon-sensor-esp32.bin \
            0x1000 "$CLASSIC/bootloader.bin" \
            0x8000 "$CLASSIC/partitions.bin" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$CLASSIC/firmware.bin"

          ls -la apps/web/public/firmware/

      - name: Commit binary to main
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/firmware/toiletmon-sensor.bin \
                  apps/web/public/firmware/toiletmon-sensor-esp32.bin
          if git diff --cached --quiet; then
            echo "Binary unchanged, nothing to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "ci: build sensor firmware binary"
          git pull --rebase origin main
          git push origin main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy so the site ships the new binary
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main -R "${{ github.repository }}"
