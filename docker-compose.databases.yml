version: '3.9'

# Only databases - the app runs directly on the server with PM2
services:
  postgres:
    image: postgres:16-alpine
    container_name: toilet_postgres
    restart: always
    environment:
      POSTGRES_DB: toilet_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Toilet2026!}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: toilet_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Automated daily backup (runs pg_dump every 24h, keeps 30 days)
  backup:
    image: postgres:16-alpine
    container_name: toilet_backup
    restart: always
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-Toilet2026!}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
        pg_dump -h postgres -U postgres toilet_monitor > /backups/backup_$$TIMESTAMP.sql 2>&1;
        if [ $$? -eq 0 ] && [ -s /backups/backup_$$TIMESTAMP.sql ]; then
          gzip /backups/backup_$$TIMESTAMP.sql;
          echo \"Backup OK: $$TIMESTAMP\";
        else
          rm -f /backups/backup_$$TIMESTAMP.sql;
          echo \"Backup FAILED: $$TIMESTAMP\";
        fi;
        find /backups -name 'backup_*.sql.gz' -mtime +30 -delete;
        sleep 86400;
      done"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
